title: "Sina Hazeghi"
description: "Robotics, AI, and systems — building to understand."
url: "https://sina-haz.github.io"
baseurl: ""

author:
  name: "Sina Hazeghi"
  email: "shazeghian@gmail.com"

plugins:
  - jekyll-feed
  - jekyll-seo-tag

collections:
  projects:
    output: false

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

social:
  github: Sina-Haz
  linkedin: sina-hazeghi

exclude:
  - SPEC.md
  - SPEC.original.md
  - README.md
  - Gemfile
  - Gemfile.lock
